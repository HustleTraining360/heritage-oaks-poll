<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Heritage Oaks Wellness Poll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #d8bc82;
      --gold-strong: #e5c88e;
      --glass: rgba(255,255,255,.05);
      --glass-border: rgba(255,255,255,.18);
      --ink: #ecf1f8;
      --muted: #b7c3d6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: 'Inter', Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      background:
        radial-gradient(1200px 500px at 0% 0%, rgba(17,44,82,.55), transparent 70%),
        radial-gradient(1000px 500px at 100% 100%, rgba(28,44,68,.45), transparent 70%),
        linear-gradient(135deg, #081322 0%, #0f1b2d 40%, #1b1f2a 100%);
      background-size: 130% 130%;
      animation: luxeShift 16s ease-in-out infinite;
    }

    @keyframes luxeShift {
      0%,100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .hero {
      position: relative;
      min-height: 38vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 40px 20px;
      border-bottom: 1px solid rgba(255,255,255,.1);
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url('https://images.unsplash.com/photo-1571902943202-507ec2618e8f?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
      opacity: .40;
      transform: scale(1.04);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(4,11,20,.32), rgba(4,11,20,.72));
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 920px;
      padding: 0 12px;
    }

    .hero img { max-width: 210px; width: 45vw; height: auto; filter: drop-shadow(0 8px 26px rgba(0,0,0,.35)); }

    h1 {
      margin: 14px 0 8px;
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3.1rem);
      letter-spacing: .2px;
    }

    .sub { color: #d5dfed; margin: 0 auto; max-width: 700px; }

    .w { max-width: 860px; margin: -56px auto 42px; padding: 0 20px; position: relative; z-index: 2; }

    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }

    label { display:block; margin: 16px 0 7px; font-weight: 600; color: #f3f7fd; }

    input,select,textarea {
      width:100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(174,194,224,.3);
      background: rgba(8,17,28,.68);
      color:#fff;
      font: inherit;
      line-height: 1.55;
      transition: border-color .25s ease, box-shadow .25s ease, background .25s ease;
    }

    input:focus,select:focus,textarea:focus {
      outline: none;
      border-color: rgba(216,188,130,.9);
      box-shadow: 0 0 0 3px rgba(216,188,130,.2);
      background: rgba(9,20,34,.82);
    }

    button {
      margin-top: 20px;
      background: linear-gradient(135deg, var(--gold), var(--gold-strong));
      color:#111;
      padding: 13px 18px;
      border:0;
      border-radius:20px;
      font-weight:700;
      cursor:pointer;
      font-family: 'Inter', sans-serif;
      transition: transform .24s ease, box-shadow .24s ease, filter .24s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(216,188,130,.3);
      filter: brightness(1.03);
    }

    .small { font-size: 13px; color: var(--muted); margin-top: 12px; }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-inner">
      <img src="logo.png" alt="Heritage Oaks logo"/>
      <h1>Heritage Oaks Luxury Wellness Poll</h1>
      <p class="sub">Help us shape an elevated fitness and wellness experience with premium coaching, recovery, and community-first programming.</p>
    </div>
  </section>

  <div class="w">
    <form id="f" class="card">
      <label>1) What matters most in a wellness club?</label>
      <select name="q1"><option>Trainer quality</option><option>Class variety</option><option>Community vibe</option><option>Recovery amenities</option></select>

      <label>2) Preferred workout time?</label>
      <select name="q2"><option>Early morning</option><option>Late morning</option><option>Afternoon</option><option>Evening</option></select>

      <label>3) Which class formats do you want most?</label>
      <input name="q3" placeholder="Pilates, Strength, Mobility, Yoga..."/>

      <label>4) Do you want premium small-group coaching?</label>
      <select name="q4"><option>Yes</option><option>No</option><option>Maybe</option></select>

      <label>5) Interest in nutrition coaching?</label>
      <select name="q5"><option>High</option><option>Medium</option><option>Low</option></select>

      <label>6) Interest in recovery services?</label>
      <select name="q6"><option>Cold plunge</option><option>Sauna</option><option>Massage therapy</option><option>All of the above</option></select>

      <label>7) How often would you attend each week?</label>
      <select name="q7"><option>1x</option><option>2x</option><option>3x</option><option>4+ times</option></select>

      <label>8) Would you bring guests to events/classes?</label>
      <select name="q8"><option>Yes</option><option>No</option><option>Sometimes</option></select>

      <label>9) Preferred communication channel?</label>
      <select name="q9"><option>Text</option><option>Email</option><option>WhatsApp</option><option>App notifications</option></select>

      <label>10) Any additional requests?</label>
      <textarea name="q10" rows="4" placeholder="Tell us what you'd love to see."></textarea>

      <button type="submit">Submit Poll</button>
      <p class="small">Submission is captured for launch QA. Live integration can be plugged in once endpoint is confirmed.</p>
    </form>
  </div>

  <script>
    document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();alert('Thanks! Your response has been recorded.');});
  </script>
</body>
</html>
