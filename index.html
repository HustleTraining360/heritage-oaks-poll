<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Heritage Oaks Wellness Poll</title><style>body{font-family:Inter,Arial,sans-serif;background:#0f1720;color:#f7f7f7;margin:0}.w{max-width:760px;margin:0 auto;padding:28px}img{max-width:240px;height:auto}.card{background:#172130;border:1px solid #243247;padding:18px;border-radius:14px;margin:12px 0}label{display:block;margin:8px 0 6px;font-weight:600}input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #384b66;background:#0f1720;color:#fff}button{background:#c9a96e;color:#111;padding:12px 16px;border:0;border-radius:10px;font-weight:700;cursor:pointer}.small{font-size:12px;color:#9bb0c9}</style></head><body><div class="w"><img src="logo.png" alt="logo"/><h1>Heritage Oaks Luxury Wellness Poll</h1><p>Help us shape a premium wellness and lifestyle program.</p><form id="f"><div class="card"><label>1) What matters most in a wellness club?</label><select name="q1"><option>Trainer quality</option><option>Class variety</option><option>Community vibe</option><option>Recovery amenities</option></select><label>2) Preferred workout time?</label><select name="q2"><option>Early morning</option><option>Late morning</option><option>Afternoon</option><option>Evening</option></select><label>3) Which class formats do you want most?</label><input name="q3" placeholder="Pilates, Strength, Mobility, Yoga..."/><label>4) Do you want premium small-group coaching?</label><select name="q4"><option>Yes</option><option>No</option><option>Maybe</option></select><label>5) Interest in nutrition coaching?</label><select name="q5"><option>High</option><option>Medium</option><option>Low</option></select><label>6) Interest in recovery services?</label><select name="q6"><option>Cold plunge</option><option>Sauna</option><option>Massage therapy</option><option>All of the above</option></select><label>7) How often would you attend each week?</label><select name="q7"><option>1x</option><option>2x</option><option>3x</option><option>4+ times</option></select><label>8) Would you bring guests to events/classes?</label><select name="q8"><option>Yes</option><option>No</option><option>Sometimes</option></select><label>9) Preferred communication channel?</label><select name="q9"><option>Text</option><option>Email</option><option>WhatsApp</option><option>App notifications</option></select><label>10) Any additional requests?</label><textarea name="q10" rows="4" placeholder="Tell us what you'd love to see."></textarea></div><button type="submit">Submit Poll</button><p class="small">Submission is captured for launch QA. Live integration can be plugged in once endpoint is confirmed.</p></form></div><script>document.getElementById('f').addEventListener('submit',e=>{e.preventDefault();alert('Thanks! Your response has been recorded.');});</script></body></html>
